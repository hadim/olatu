# Olatu — Python side: a minimal, scriptable data pipeline (no installable package).
# CANDHIS CSV -> cleaned, tiered Parquet/JSON for the static webapp.
# See specs/2026-06-27-0001-foundation.md §5 and §9.

[workspace]
name = "olatu"
description = "Ingest CANDHIS wave-buoy data (CSV -> tiered Parquet/JSON) for the Olatu webapp."
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
# --- Data pipeline (data lives in the HF dataset hadim/olatu, not in git) ---
# The usual refresh — pull from HF, scrape the live CANDHIS feed, rebuild the tiers,
# upload back to the dataset. Same command locally and in CI:
#   pixi run update                 # campaign 06403 by default
#   pixi run update --campaign 06402
update = "python -m ingest.update"
# Lower-level steps (the working mirror is ./hfdata/<campaign>/{raw,data}):
#   scrape the live feed into the local reel accumulator
scrape = "python -m ingest.scrape --src hfdata/06403/raw"
#   build the tiers from the local raw CSVs
ingest = "python -m ingest.build --src hfdata/06403/raw --out hfdata/06403/data"

# --- Webapp (frontend) ---
webapp-install = { cmd = "npm install", cwd = "webapp" }
# Start the webapp locally (installs deps if needed):
#   pixi run webapp
webapp = { cmd = "npm run dev", cwd = "webapp", depends-on = ["webapp-install"] }
webapp-build = { cmd = "npm run build", cwd = "webapp", depends-on = ["webapp-install"] }
webapp-preview = { cmd = "npm run preview", cwd = "webapp", depends-on = ["webapp-build"] }

# --- Lint / format (Python) ---
format = "ruff format ."
lint = "ruff check --fix ."
check = { depends-on = ["format", "lint"] }

[dependencies]
python = ">=3.13,<4"
polars = ">=1.18"
pyarrow = ">=24.0.0"
# For the realtime scraper that pulls the CANDHIS web table:
httpx = ">=0.28"
lxml = ">=6.1.1"
# Publishes the built tiers + raw CSVs to the HF dataset (hadim/olatu) and provides
# the `hf` CLI (OIDC trusted-publisher uploads in CI). See specs/0004 §6.
huggingface_hub = ">=1.21.0"
# Frontend toolchain (so `pixi run webapp` works without a system Node):
nodejs = ">=22"
# Dev
ruff = ">=0.15.20"
