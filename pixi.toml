# Olatu — Python side: a minimal, scriptable data pipeline (no installable package).
# CANDHIS CSV -> cleaned, tiered Parquet/JSON for the static webapp.
# See specs/2026-06-27-0001-foundation.md §5 and §9.

[workspace]
name = "olatu"
description = "Ingest CANDHIS wave-buoy data (CSV -> tiered Parquet/JSON) for the Olatu webapp."
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[tasks]
# --- Data pipeline ---
# Scrape the CANDHIS realtime feed (incl. sea temperature) into per-year reel CSVs
# under --src; run regularly (<= ~36 h apart) so the series grows continuously:
#   pixi run scrape [--src /path/to/csv]
scrape = "python -m ingest.scrape"
# Build the tiered data files. Override paths, e.g.:
#   pixi run ingest --src /path/to/csv --out data
ingest = "python -m ingest.build"
# Scrape the latest realtime data, then rebuild the tiers (the usual refresh):
#   pixi run update
update = { cmd = "python -m ingest.build", depends-on = ["scrape"] }

# --- Webapp (frontend) ---
webapp-install = { cmd = "npm install", cwd = "webapp" }
# Start the webapp locally (installs deps if needed):
#   pixi run webapp
webapp = { cmd = "npm run dev", cwd = "webapp", depends-on = ["webapp-install"] }
webapp-build = { cmd = "npm run build", cwd = "webapp", depends-on = ["webapp-install"] }
webapp-preview = { cmd = "npm run preview", cwd = "webapp", depends-on = ["webapp-build"] }

# --- Lint / format (Python) ---
format = "ruff format ."
lint = "ruff check --fix ."
check = { depends-on = ["format", "lint"] }

[dependencies]
python = ">=3.13,<4"
polars = ">=1.18"
pyarrow = ">=24.0.0"
# For the (future) realtime scraper that pulls the CANDHIS web table:
httpx = ">=0.28"
lxml = ">=6.1.1"
# Frontend toolchain (so `pixi run webapp` works without a system Node):
nodejs = ">=22"
# Dev
ruff = ">=0.15.20"
