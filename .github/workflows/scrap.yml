name: Scrap

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes

jobs:
  scrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          activate-environment: true

      - name: Install dependencies
        run: pixi install

      - name: Scrap data
        run: pixi run wave-buoys-viewer --data-path ./data/wave_buoys_data_prod.parquet

      - name: Commit data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ./data/wave_buoys_data_prod.parquet
          git commit -m "Update wave buoys data" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Build package
        run: cd webapp && npm install && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp/dist
