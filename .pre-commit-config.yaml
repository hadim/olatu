repos:
  - repo: local
    hooks:
      - id: pixi-format
        name: Pixi format
        entry: pixi run format
        language: system
        pass_filenames: false
        description: Run the project's formatter via Pixi (ruff format)

      - id: pixi-lint
        name: Pixi lint
        entry: pixi run lint
        language: system
        pass_filenames: false
        description: Run the project's linter via Pixi (ruff check --fix)

      - id: pixi-lock
        name: Pixi lock
        entry: pixi lock
        language: system
        pass_filenames: false
        description: Update the Pixi lockfile

